<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte Planta - Alimentos Magros</title>
    <style>
        :root { --primary: #2c3e50; --accent: #2980b9; --bg: #ffffff; }
        body { font-family: -apple-system, sans-serif; background-color: #ccc; padding: 5px; margin: 0; }
        .container { max-width: 480px; margin: auto; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); margin-bottom: 8px; padding-bottom: 2px; }
        #liveClock { font-weight: bold; color: var(--accent); font-size: 0.85rem; }
        h2 { font-size: 0.95rem; margin: 0; color: var(--primary); text-transform: uppercase; }
        .section-title { background: var(--primary); color: white; padding: 3px 8px; font-size: 0.75rem; border-radius: 4px; margin: 8px 0 5px 0; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .input-group { margin-bottom: 5px; }
        label { display: block; font-size: 0.7rem; color: #666; margin-bottom: 1px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 0.9rem; }
        textarea { height: 50px; resize: none; }
        .btn-enviar { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .btn-enviar:active { transform: scale(0.98); background: #219150; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>Control Diario Planta</h2>
        <div id="liveClock">00:00:00</div>
    </div>
    <div class="grid">
        <div class="input-group"><label>Nivel Hidro (m)</label><input type="number" id="nHidro" step="0.01"></div>
        <div class="input-group"><label>kWh Motor</label><input type="number" id="kwh"></div>
    </div>
    <div class="section-title">BIODIGESTOR 1</div>
    <div class="grid">
        <div class="input-group"><label>Temp (°C)</label><input type="number" id="t1" step="0.1"></div>
        <div class="input-group"><label>pH</label><input type="number" id="ph1" step="0.01"></div>
        <div class="input-group"><label>Nivel (m)</label><input type="number" id="n1" step="0.01"></div>
        <div class="input-group"><label>Espuma (m)</label><input type="number" id="e1" step="0.01"></div>
    </div>
    <div class="grid">
        <div class="input-group"><label>V1 (5ml)</label><input type="number" id="v1_1" step="0.1"></div>
        <div class="input-group"><label>V2 (4.4)</label><input type="number" id="v2_1" step="0.1"></div>
    </div>
    <div class="section-title">BIODIGESTOR 2</div>
    <div class="grid">
        <div class="input-group"><label>Temp (°C)</label><input type="number" id="t2" step="0.1"></div>
        <div class="input-group"><label>pH</label><input type="number" id="ph2" step="0.01"></div>
        <div class="input-group"><label>Nivel (m)</label><input type="number" id="n2" step="0.01"></div>
        <div class="input-group"><label>Espuma (m)</label><input type="number" id="e2" step="0.01"></div>
    </div>
    <div class="grid">
        <div class="input-group"><label>V1 (5ml)</label><input type="number" id="v1_2" step="0.1"></div>
        <div class="input-group"><label>V2 (4.4)</label><input type="number" id="v2_2" step="0.1"></div>
    </div>
    <div class="section-title">OBSERVACIONES</div>
    <textarea id="obs"></textarea>
    <button class="btn-enviar" onclick="enviar()">ENVIAR REPORTE</button>
</div>
<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbxD01-bsRa4emtZfNjjIEUB_eCfNdWQZ_2qXtLuVZdkBgK8P8jHw_1XwTTAAsjOhjHP/exec";

    function updateClock() { document.getElementById('liveClock').innerText = new Date().toLocaleTimeString(); }
    setInterval(updateClock, 1000);

    async function enviar() {
        const getRes = (n) => {
            const v1 = parseFloat(document.getElementById('v1_'+n).value) || 0;
            const v2 = parseFloat(document.getElementById('v2_'+n).value) || 0;
            const tac = v1 * 500;
            const fos = ((v2 * 2 * 1.66) - 0.15) * 500;
            return {f:fos.toFixed(0), t:tac.toFixed(0), r:(fos/tac).toFixed(3)};
        };
        const r1 = getRes(1); const r2 = getRes(2);
        const datos = {
            tipoAccion: "CONTROL_DIARIO",
            nHidro: document.getElementById('nHidro').value, kwh: document.getElementById('kwh').value,
            t1: document.getElementById('t1').value, ph1: document.getElementById('ph1').value,
            n1: document.getElementById('n1').value, e1: document.getElementById('e1').value,
            fos1: r1.f, tac1: r1.t, ratio1: r1.r,
            t2: document.getElementById('t2').value, ph2: document.getElementById('ph2').value,
            n2: document.getElementById('n2').value, e2: document.getElementById('e2').value,
            fos2: r2.f, tac2: r2.t, ratio2: r2.r, obs: document.getElementById('obs').value
        };
        if (!confirm("¿Desea enviar?")) return;
        try {
            await fetch(URL_SCRIPT, { method: "POST", mode: "no-cors", body: JSON.stringify(datos) });
            alert("✅ Enviado"); location.reload();
        } catch (e) { alert("❌ Error"); }
    }
</script>
</body>
</html>
