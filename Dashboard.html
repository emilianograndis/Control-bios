<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Alimentos Magros</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #1b5e20; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); padding: 10px; }
        .header { background: var(--primary); color: white; padding: 10px; border-radius: 6px; text-align: center; }
        .chart-card { background: white; padding: 15px; border-radius: 8px; margin-top: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="header"><h1>DASHBOARD PLANTA</h1></div>
    <div class="chart-card"><canvas id="chartOlr"></canvas></div>
    <div class="chart-card"><canvas id="chartRatios"></canvas></div>
    <div class="chart-card"><canvas id="chartTemp"></canvas></div>

    <script>
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbxD01-bsRa4emtZfNjjIEUB_eCfNdWQZ_2qXtLuVZdkBgK8P8jHw_1XwTTAAsjOhjHP/exec";

        async function cargarDatos() {
            try {
                const response = await fetch(URL_SCRIPT + "?action=getDashboard");
                const data = await response.json();
                renderCharts(data);
            } catch (e) { alert("Error al cargar dashboard"); }
        }

        function renderCharts(data) {
            const commonOptions = { responsive: true, plugins: { legend: { position: 'bottom' } } };

            // 1. Gráfico OLR (Cargas)
            new Chart(document.getElementById('chartOlr'), {
                type: 'bar',
                data: {
                    labels: data.cargas.map(d => d.fecha),
                    datasets: [
                        { label: 'Bio 1', data: data.cargas.map(d => d.olr1), backgroundColor: '#81c784' },
                        { label: 'Bio 2', data: data.cargas.map(d => d.olr2), backgroundColor: '#64b5f6' }
                    ]
                },
                options: commonOptions
            });

            // 2. Ratios
            new Chart(document.getElementById('chartRatios'), {
                type: 'line',
                data: {
                    labels: data.biologico.map(d => d.fecha),
                    datasets: [
                        { label: 'Ratio 1', data: data.biologico.map(d => d.ratio1), borderColor: '#2e7d32' },
                        { label: 'Ratio 2', data: data.biologico.map(d => d.ratio2), borderColor: '#1565c0' }
                    ]
                },
                options: commonOptions
            });

            // 3. Temperaturas
            new Chart(document.getElementById('chartTemp'), {
                type: 'line',
                data: {
                    labels: data.biologico.map(d => d.fecha),
                    datasets: [
                        { label: 'T1', data: data.biologico.map(d => d.t1), borderColor: '#f44336' },
                        { label: 'T2', data: data.biologico.map(d => d.t2), borderColor: '#2196f3' }
                    ]
                },
                options: commonOptions
            });
        }
        cargarDatos();
    </script>
</body>
</html>
