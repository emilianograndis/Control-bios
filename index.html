<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Menú Biodigestores</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary: #1b5e20;
            --secondary: #27ae60;
            --accent: #1565c0;
            --bg: #f4f7f6;
        }
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 20px; 
            background: var(--bg); 
            margin: 0;
        }
        h1 { color: var(--primary); margin-bottom: 30px; }
        .container { max-width: 400px; margin: 0 auto; }
        .boton { 
            display: block; 
            width: 100%; 
            padding: 20px; 
            margin: 15px 0; 
            background: var(--secondary); 
            color: white; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 18px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            box-sizing: border-box;
        }
        .boton:active { transform: scale(0.98); }
        .boton-dash { background: var(--accent); } 
    </style>
</head>
<body>
    <div class="container">
        <h1>Gestión Planta</h1>
        
        <a href="cargas.html" class="boton">🚜 Cargas a Biodigestores</a>
        
        <a href="diario.html" class="boton">📝 Registro Diario</a>
        
        <a href="Dashboard.html" class="boton boton-dash">📊 Dashboard Tiempo Real</a>
    </div>
</body>
</html>
