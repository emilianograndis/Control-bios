<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbxD01-bsRa4emtZfNjjIEUB_eCfNdWQZ_2qXtLuVZdkBgK8P8jHw_1XwTTAAsjOhjHP/exec"; 
    let pendientesGlobal = [];
    let indiceSeleccionado = 0;

    function limpiarHora(s) { return s ? s.toString().includes("T") ? s.split("T")[1].substring(0, 5) : s.substring(0, 5) : "--:--"; }

    async function consultarPlan() {
        try {
            const res = await fetch(URL_SCRIPT + "?action=getPlanilla");
            const cargas = await res.json();
            document.getElementById('listaHistorial').innerHTML = "";
            document.getElementById('tabsTareas').innerHTML = "";
            document.getElementById('contenedorActivo').innerHTML = "";
            
            pendientesGlobal = cargas.filter(c => c.estado === "Pendiente");
            
            // Render historial detallado
            cargas.filter(c => c.estado === "Completado").forEach(c => {
                let detalle = "";
                if(c.id.toUpperCase().includes("TRASBASE")) {
                    detalle = `Trasbase D1: ${c.t12}m³ | D2: ${c.t2L}m³`;
                } else {
                    detalle = `B1: ${c.b1_m_real}m/ ${c.b1_s_real}s | B2: ${c.b2_m_real}m/ ${c.b2_s_real}s | ST: ${c.st}%`;
                }
                document.getElementById('listaHistorial').innerHTML += `
                    <div class="item-historial">
                        ✅ <b>${c.id} (${limpiarHora(c.hora)}hs)</b><br>
                        <span style="color:#666">${detalle}</span>
                    </div>`;
            });

            if (pendientesGlobal.length > 0) {
                pendientesGlobal.forEach((c, index) => {
                    const btnTab = document.createElement('button');
                    btnTab.className = `tab-btn ${index === 0 ? 'active' : ''}`;
                    btnTab.innerText = `${c.id} (${limpiarHora(c.hora)})`;
                    btnTab.onclick = () => seleccionarTarea(index);
                    document.getElementById('tabsTareas').appendChild(btnTab);
                });
                renderActiva(0);
            } else {
                document.getElementById('contenedorActivo').innerHTML = "<p style='text-align:center; padding:20px;'>Sin tareas pendientes.</p>";
            }
        } catch (e) { alert("Error al cargar datos."); }
    }

    function seleccionarTarea(index) {
        indiceSeleccionado = index;
        document.querySelectorAll('.tab-btn').forEach((b, i) => i === index ? b.classList.add('active') : b.classList.remove('active'));
        renderActiva(index);
    }

    function evaluarColor(input, obj) {
        if (input.value === "") { input.classList.remove('match', 'mismatch'); return; }
        if (parseFloat(input.value) === parseFloat(obj)) { input.classList.add('match'); input.classList.remove('mismatch'); } 
        else { input.classList.add('mismatch'); input.classList.remove('match'); }
    }

    function renderActiva(index) {
        const c = pendientesGlobal[index];
        const isT = c.id.toUpperCase().includes("TRASBASE");
        let html = `<div class="card">
            <div style="display:flex; justify-content:space-between; font-weight:bold; margin-bottom:10px;">
                <span>${c.id}</span><span>🕒 ${limpiarHora(c.hora)} hs</span>
            </div>`;

        if (isT) {
            html += `<div class="bio-group"><div class="bio-title">TRASBASE</div><p>D1 a D2: <b>${c.t12}m³</b></p><p>D2 a Laguna: <b>${c.t2L}m³</b></p></div>`;
        } else {
            html += `
                <div class="bio-group">
                    <div class="bio-title">BIODIGESTOR 1</div>
                    <div class="fila-input bg-mucanga"><div class="obj-box"><span>MUCA</span><div class="obj-val">${c.b1_m_obj}</div></div><input type="number" id="r1m" oninput="evaluarColor(this, ${c.b1_m_obj})" placeholder="REAL"></div>
                    <div class="fila-input bg-suero"><div class="obj-box"><span>SUE</span><div class="obj-val">${c.b1_s_obj}</div></div><input type="number" id="r1s" oninput="evaluarColor(this, ${c.b1_s_obj})" placeholder="REAL"></div>
                </div>
                <div class="bio-group">
                    <div class="bio-title">BIODIGESTOR 2</div>
                    <div class="fila-input bg-mucanga"><div class="obj-box"><span>MUCA</span><div class="obj-val">${c.b2_m_obj}</div></div><input type="number" id="r2m" oninput="evaluarColor(this, ${c.b2_m_obj})" placeholder="REAL"></div>
                    <div class="fila-input bg-suero"><div class="obj-box"><span>SUE</span><div class="obj-val">${c.b2_s_obj}</div></div><input type="number" id="r2s" oninput="evaluarColor(this, ${c.b2_s_obj})" placeholder="REAL"></div>
                </div>
                <div class="st-container">
                    <select id="stValue"><option value="">-- Seleccionar %ST --</option>
                        <option value="5">5%</option><option value="10">10%</option><option value="15">15%</option><option value="20">20%</option><option value="25">25%</option><option value="30">30%</option><option value="35">35%</option><option value="40">40%</option>
                    </select>
                </div>`;
        }
        html += `<button class="btn-enviar" onclick="enviar()">CONFIRMAR</button></div>`;
        document.getElementById('contenedorActivo').innerHTML = html;
    }

    async function enviar() {
        if (indiceSeleccionado > 0) {
            const anterior = pendientesGlobal[indiceSeleccionado - 1];
            if (!confirm(`⚠️ AVISO: Hay una carga anterior pendiente (${anterior.id}). ¿Confirmar esta de todos modos?`)) return;
        }

        const c = pendientesGlobal[indiceSeleccionado];
        const isT = c.id.toUpperCase().includes("TRASBASE");
        let data = { tipoAccion: "REGISTRO_CARGA", bache: c.id };

        if (!isT) {
            const r1m = document.getElementById('r1m').value;
            const r1s = document.getElementById('r1s').value;
            const r2m = document.getElementById('r2m').value;
            const r2s = document.getElementById('r2s').value;
            const st = document.getElementById('stValue').value;
            if (!r1m || !r1s || !r2m || !r2s || !st) { alert("❌ Completa todo"); return; }
            data.r1m = r1m; data.r1s = r1s; data.r2m = r2m; data.r2s = r2s; data.st = st;
        }

        if (!confirm("¿Confirmar?")) return;
        document.querySelector('.btn-enviar').innerText = "ENVIANDO...";
        await fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        alert("✅ Guardado");
        consultarPlan();
    }
    window.onload = consultarPlan;
</script>
</body>
</html>
